name: Bug report
description: Report a reproducible defect in an HLEcosystem app
title: "[bug] "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        **Before filing**: if this is a security vulnerability, do not open a public issue — use [GitHub Security Advisories](https://github.com/FoxxDev-Collab/HLEcosystem/security/advisories/new) instead. See [SECURITY.md](../SECURITY.md).

  - type: dropdown
    id: app
    attributes:
      label: Affected app
      options:
        - hle-family_manager
        - hle-familyhub
        - hle-family_finance
        - hle-family_health
        - hle-family_home_care
        - hle-file_server
        - hle-meal_prep
        - hle-family_wiki
        - hle-family_travel
        - hle-claude_api
        - Shared infrastructure (compose, Containerfile, hle.sh)
        - Documentation
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit SHA or version
      description: Output of `git rev-parse --short HEAD` in your local clone
      placeholder: e.g. 39b9755
    validations:
      required: true

  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal numbered steps. Include any data shape that triggers it.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output from `./hle.sh logs <service>` or browser console. Redact PII.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Podman version, Node version, browser if applicable.
      placeholder: |
        OS: RHEL 9.4
        Podman: 4.9.0
        Node: 22.11.0
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Sanity checks
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: This is not a security vulnerability (if it is, I will use GitHub Security Advisories instead)
          required: true
        - label: I have included steps to reproduce
          required: true
