# Dependabot configuration for HLEcosystem.
#
# Policy:
#   1. Security updates are delivered immediately, bypassing the weekly
#      schedule and the major-version ignore rules below.
#   2. Routine (non-security) updates are GROUPED into one PR per app
#      per week: one for prod deps, one for dev deps. This prevents the
#      PR flood we saw pre-2026-04-09 (55 individual PRs in a day).
#   3. Major version bumps are IGNORED for routine updates. Major bumps
#      require human review and are handled via manual issues/PRs.
#      Dependabot still opens security PRs even if they're majors.
#   4. The docker ecosystem watches Containerfile.nextjs for base image
#      digest updates and auto-PRs when node:22-alpine publishes a new
#      SHA — critical for picking up CVE fixes in node/alpine.

version: 2
updates:

  # ============================================================
  # GitHub Actions workflow dependencies
  # ============================================================
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message: { prefix: "[ci]" }
    groups:
      actions-updates:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ============================================================
  # Docker base image — watches FROM lines in Containerfile.nextjs
  # Critical for pulling in node / alpine CVE fixes (see docs/THREAT_MODEL.md
  # §6 G-10 and G-11 for current upstream-gated CVEs).
  # ============================================================
  - package-ecosystem: docker
    directory: "/"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 5
    labels: [dependencies, docker]
    commit-message: { prefix: "[infra]" }

  # ============================================================
  # Per-app npm updates
  # Each app gets the same config: group prod and dev minor+patch into
  # one PR each per week, ignore majors, accept any severity on security.
  # ============================================================

  - package-ecosystem: npm
    directory: "/hle-claude_api"
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 5
    labels: [dependencies, claude_api]
    commit-message: { prefix: "[claude_api]" }
    groups:
      prod-updates:
        dependency-type: production
        update-types: [minor, patch]
      dev-updates:
        dependency-type: development
        update-types: [minor, patch]
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

