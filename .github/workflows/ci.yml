name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: Detect changed apps
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    outputs:
      node-apps: ${{ steps.set.outputs.node-apps }}
      bun-apps: ${{ steps.set.outputs.bun-apps }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - id: set
        name: Determine matrices
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            changed=$(git diff --name-only "$base" "$head" || true)
          else
            changed=$(git diff --name-only HEAD^ HEAD || true)
          fi
          # Always run the full matrix on shared-infra or workflow changes.
          # Containerfile.bun changes also force a full run since they affect
          # the Bun-runtime apps.
          if echo "$changed" | grep -qE '^(compose\.yaml|Containerfile\.nextjs|Containerfile\.bun|hle\.sh|\.github/workflows/)'; then
            apps='["hle-claude_api","hle-family_finance","hle-family_health","hle-family_home_care","hle-family_manager","hle-family_travel","hle-family_wiki","hle-familyhub","hle-file_server","hle-meal_prep","hle-media"]'
          else
            apps=$(echo "$changed" | awk -F/ '/^hle-/ {print $1}' | sort -u | jq -R . | jq -s -c .)
            if [ "$apps" = "[]" ] || [ -z "$apps" ]; then
              apps='[]'
            fi
          fi
          # Split into Node (package-lock.json) vs Bun (bun.lock) apps.
          node_apps='[]'
          bun_apps='[]'
          for app in $(echo "$apps" | jq -r '.[]'); do
            if [ -f "$app/bun.lock" ] || [ -f "$app/bun.lockb" ]; then
              bun_apps=$(echo "$bun_apps" | jq -c --arg a "$app" '. + [$a]')
            elif [ -f "$app/package-lock.json" ]; then
              node_apps=$(echo "$node_apps" | jq -c --arg a "$app" '. + [$a]')
            else
              echo "::warning::$app has neither bun.lock nor package-lock.json — skipping"
            fi
          done
          echo "node-apps=$node_apps" >> "$GITHUB_OUTPUT"
          echo "bun-apps=$bun_apps" >> "$GITHUB_OUTPUT"
          echo "Node matrix: $node_apps"
          echo "Bun matrix:  $bun_apps"

  build-node:
    name: lint + typecheck (${{ matrix.app }})
    needs: detect
    if: github.server_url == 'https://github.com' && needs.detect.outputs.node-apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect.outputs.node-apps) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install
        working-directory: ${{ matrix.app }}
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        working-directory: ${{ matrix.app }}
        run: npx prisma generate || true

      - name: Lint
        working-directory: ${{ matrix.app }}
        run: npm run lint

      - name: Typecheck
        working-directory: ${{ matrix.app }}
        run: npx tsc --noEmit

      - name: Test (if vitest.config.ts exists)
        working-directory: ${{ matrix.app }}
        shell: bash
        env:
          APP: ${{ matrix.app }}
        run: |
          if [ -f vitest.config.ts ] || [ -f vitest.config.js ] || [ -f vitest.config.mjs ]; then
            npm test
          else
            echo "No vitest config in $APP — skipping (see docs/TESTING.md roadmap)."
          fi

  build-bun:
    name: lint + typecheck (${{ matrix.app }})
    needs: detect
    if: github.server_url == 'https://github.com' && needs.detect.outputs.bun-apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect.outputs.bun-apps) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install
        working-directory: ${{ matrix.app }}
        run: bun install --frozen-lockfile

      # No `lint` script in Bun-runtime apps yet (hle-media has no eslint/biome
      # config). Add one and a Lint step here when it exists. The Security
      # invariant gate (security.yml) still applies the project-wide forbidden-
      # patterns check across the diff.
      - name: Typecheck
        working-directory: ${{ matrix.app }}
        run: bunx tsc --noEmit

      - name: Test
        working-directory: ${{ matrix.app }}
        run: bun test

  # Summary job so branch protection can require a single check.
  # Note: the lint/type suppression check (formerly no-disable-smuggling here)
  # is now covered by the `invariant-gate` job in security.yml, which also
  # checks for $queryRawUnsafe, dangerouslySetInnerHTML, and explicit `any`.
  ci-passed:
    name: CI passed
    needs: [detect, build-node, build-bun]
    if: always() && github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        env:
          NODE_RESULT: ${{ needs.build-node.result }}
          BUN_RESULT: ${{ needs.build-bun.result }}
          NODE_APPS: ${{ needs.detect.outputs.node-apps }}
          BUN_APPS: ${{ needs.detect.outputs.bun-apps }}
        run: |
          # A skipped result is success for our purposes (no apps of that
          # runtime were changed). Only an actual failure should fail this job.
          if [ "$NODE_APPS" != "[]" ] && [ "$NODE_RESULT" != "success" ]; then
            echo "build-node failed (result=$NODE_RESULT)"
            exit 1
          fi
          if [ "$BUN_APPS" != "[]" ] && [ "$BUN_RESULT" != "success" ]; then
            echo "build-bun failed (result=$BUN_RESULT)"
            exit 1
          fi
          echo "All checks passed."
