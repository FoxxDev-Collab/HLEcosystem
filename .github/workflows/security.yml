name: Security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly scan every Monday 06:00 UTC — catches new CVEs in unchanged deps
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Static analysis of the workflow YAML itself — catches script-injection sinks,
  # overly-permissive tokens, unpinned actions, etc.
  zizmor:
    name: Workflow audit (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install zizmor
        run: pipx install zizmor

      - name: Run zizmor
        run: zizmor --format sarif .github/workflows/ > zizmor.sarif || true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  # Blocks PRs that add vulnerable or incompatibly-licensed dependencies
  # before they reach trivy/npm-audit. Fast feedback on review.
  dependency-review:
    name: Dependency review (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # Enforces ADR-0005 and the CLAUDE.md "Critical Rules" invariants in CI.
  # If any of these patterns land in a PR diff, the job fails. This is the
  # machine-checkable backstop for the rules that have already been violated once.
  invariant-gate:
    name: Security invariant gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR diff for forbidden patterns
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          DIFF=$(git diff "$BASE_SHA" "$HEAD_SHA" -- '*.ts' '*.tsx' '*.js' '*.jsx')
          ADDED=$(printf '%s\n' "$DIFF" | grep -E '^\+' | grep -v '^\+\+\+' || true)

          fail=0
          check() {
            local pattern="$1" label="$2"
            if printf '%s\n' "$ADDED" | grep -E "$pattern" >/dev/null; then
              echo "::error::$label — forbidden pattern introduced in this PR"
              printf '%s\n' "$ADDED" | grep -nE "$pattern" || true
              fail=1
            fi
          }

          check '\$queryRawUnsafe|\$executeRawUnsafe'       'Unsafe raw SQL'
          check 'dangerouslySetInnerHTML'                    'dangerouslySetInnerHTML'
          check 'eslint-disable|@ts-ignore|@ts-expect-error|@ts-nocheck' 'Lint/type suppression (see CLAUDE.md §11)'
          check ':\s*any(\s|,|\)|>|;|$)'                     'Explicit any type'

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more security invariants were violated. See CLAUDE.md 'Security workflow' section."
            exit 1
          fi
          echo "All security invariants satisfied."

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for historical scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    name: Dependency + config scan (trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # SARIF upload to code scanning
    steps:
      - uses: actions/checkout@v4

      # Pinned to commit SHA (was @master) — trivy-action has security-events: write
      # downstream, so a compromised master could poison SARIF or exfiltrate tokens.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master @ 2026-04-08
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-results.sarif
          skip-dirs: node_modules,.next,HLEcosystem_Dotnet_Backup

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Fail on critical/high findings
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master @ 2026-04-08
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"
          skip-dirs: node_modules,.next,HLEcosystem_Dotnet_Backup

  npm-audit:
    name: npm audit (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - hle-claude_api
          - hle-family_finance
          - hle-family_health
          - hle-family_home_care
          - hle-family_manager
          - hle-family_travel
          - hle-family_wiki
          - hle-familyhub
          - hle-file_server
          - hle-meal_prep
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      # Lockfile integrity: `npm ci` fails hard if package.json and
      # package-lock.json have drifted, preventing unreviewed dep changes.
      - name: Verify lockfile integrity
        working-directory: ${{ matrix.app }}
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: npm audit (fail on high)
        working-directory: ${{ matrix.app }}
        run: npm audit --audit-level=high --omit=dev

  codeql:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-javascript

  # Pulls live alert counts from GitHub's security APIs and posts a structured
  # summary comment on every PR push. Replaces Dependabot version-update PRs —
  # vulnerability data comes from the Dependabot alerts API (enabled in repo
  # settings) without generating automated PRs.
  security-report:
    name: Security alert summary
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      security-events: read
      pull-requests: write
    steps:
      - name: Fetch alerts and post PR summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # ── Code scanning (CodeQL, Trivy, zizmor) ──────────────────
          code_alerts=$(gh api --paginate \
            "repos/$REPO/code-scanning/alerts?state=open&per_page=100" \
            2>/dev/null || echo "[]")

          cs_critical=$(printf '%s' "$code_alerts" | jq '[.[] | select(.rule.security_severity_level == "critical")] | length')
          cs_high=$(printf '%s'     "$code_alerts" | jq '[.[] | select(.rule.security_severity_level == "high")]     | length')
          cs_medium=$(printf '%s'   "$code_alerts" | jq '[.[] | select(.rule.security_severity_level == "medium")]   | length')
          cs_low=$(printf '%s'      "$code_alerts" | jq '[.[] | select(.rule.security_severity_level == "low")]      | length')
          cs_total=$(printf '%s'    "$code_alerts" | jq 'length')

          # ── Dependency vulnerability alerts (replaces Dependabot PRs) ─
          dep_alerts=$(gh api --paginate \
            "repos/$REPO/dependabot/alerts?state=open&per_page=100" \
            2>/dev/null || echo "[]")

          dep_critical=$(printf '%s' "$dep_alerts" | jq '[.[] | select(.security_advisory.severity == "critical")] | length')
          dep_high=$(printf '%s'     "$dep_alerts" | jq '[.[] | select(.security_advisory.severity == "high")]     | length')
          dep_medium=$(printf '%s'   "$dep_alerts" | jq '[.[] | select(.security_advisory.severity == "medium")]   | length')
          dep_low=$(printf '%s'      "$dep_alerts" | jq '[.[] | select(.security_advisory.severity == "low")]      | length')
          dep_total=$(printf '%s'    "$dep_alerts" | jq 'length')

          # ── Secret scanning ────────────────────────────────────────
          ss_total=$(gh api --paginate \
            "repos/$REPO/secret-scanning/alerts?state=open&per_page=100" \
            2>/dev/null | jq 'length' || echo "0")

          # ── Status badge ───────────────────────────────────────────
          if [ "$ss_total" -gt 0 ] || [ "$cs_critical" -gt 0 ] || [ "$dep_critical" -gt 0 ]; then
            badge="🔴 Critical action required"
          elif [ "$cs_high" -gt 0 ] || [ "$dep_high" -gt 0 ]; then
            badge="🟠 High severity findings"
          elif [ "$cs_medium" -gt 0 ] || [ "$dep_medium" -gt 0 ]; then
            badge="🟡 Medium severity findings"
          elif [ "$cs_total" -gt 0 ] || [ "$dep_total" -gt 0 ]; then
            badge="🔵 Low severity findings"
          else
            badge="✅ No open alerts"
          fi

          # ── Build report ───────────────────────────────────────────
          {
            echo "## Security Report — ${badge}"
            echo ""
            echo "> Snapshot of open GitHub Security alerts at the time of this push."
            echo "> Full details → [Security tab](https://github.com/${REPO}/security)"
            echo ""

            echo "### Code Scanning — CodeQL · Trivy · zizmor"
            echo ""
            echo "| Severity | Count |"
            echo "|----------|------:|"
            echo "| 🔴 Critical | ${cs_critical} |"
            echo "| 🟠 High     | ${cs_high}     |"
            echo "| 🟡 Medium   | ${cs_medium}   |"
            echo "| 🔵 Low      | ${cs_low}      |"
            echo "| **Total open** | **${cs_total}** |"
            echo ""

            if [ "$cs_critical" -gt 0 ] || [ "$cs_high" -gt 0 ]; then
              echo "<details><summary>Critical / High code scanning detail</summary>"
              echo ""
              echo "| Tool | Severity | Finding | File |"
              echo "|------|----------|---------|------|"
              printf '%s' "$code_alerts" | jq -r '
                .[] | select(
                  .rule.security_severity_level == "critical" or
                  .rule.security_severity_level == "high"
                ) | "| \(.tool.name) | \(.rule.security_severity_level) | \(.rule.description // .rule.id) | `\(.most_recent_instance.location.path // "—")` |"
              ' | head -25
              echo ""
              echo "</details>"
              echo ""
            fi

            echo "### Dependency Vulnerabilities"
            echo ""
            echo "| Severity | Count |"
            echo "|----------|------:|"
            echo "| 🔴 Critical | ${dep_critical} |"
            echo "| 🟠 High     | ${dep_high}     |"
            echo "| 🟡 Medium   | ${dep_medium}   |"
            echo "| 🔵 Low      | ${dep_low}      |"
            echo "| **Total open** | **${dep_total}** |"
            echo ""

            if [ "$dep_critical" -gt 0 ] || [ "$dep_high" -gt 0 ]; then
              echo "<details><summary>Critical / High dependency detail</summary>"
              echo ""
              echo "| Package | Severity | CVE | Fix available |"
              echo "|---------|----------|-----|---------------|"
              printf '%s' "$dep_alerts" | jq -r '
                .[] | select(
                  .security_advisory.severity == "critical" or
                  .security_advisory.severity == "high"
                ) | "| `\(.dependency.package.name)` | \(.security_advisory.severity) | \(.security_advisory.cve_id // "—") | \(.security_vulnerability.first_patched_version.identifier // "No fix") |"
              ' | head -25
              echo ""
              echo "</details>"
              echo ""
            fi

            echo "### Secret Scanning"
            echo ""
            if [ "$ss_total" -gt 0 ]; then
              echo "🚨 **${ss_total} open secret(s) detected.** Review immediately → [Secret scanning alerts](https://github.com/${REPO}/security/secret-scanning)"
            else
              echo "✅ No open secrets."
            fi

            echo ""
            echo "---"
            echo "*Updated on every push · [View all alerts](https://github.com/${REPO}/security)*"
          } > /tmp/security-report.md

          # ── Write to GitHub Actions job summary ───────────────────
          cat /tmp/security-report.md >> "$GITHUB_STEP_SUMMARY"

          # ── Post or update PR comment ─────────────────────────────
          existing=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq '[.[] | select(.body | test("^## Security Report"))] | last | .id' \
            2>/dev/null || echo "")

          body_json=$(jq -Rs '{"body": .}' /tmp/security-report.md)

          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh api "repos/$REPO/issues/comments/$existing" \
              -X PATCH --input - <<< "$body_json"
          else
            gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              -X POST --input - <<< "$body_json"
          fi
