name: OpenSSF Scorecard

# Weekly supply-chain posture check. Publishes a public scorecard badge and
# uploads SARIF to code scanning. Free FOSS-credibility signal and catches
# regressions in branch protection, token permissions, pinned deps, etc.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 7 * * 1"  # Mondays 07:00 UTC
  push:
    branches: [master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: scorecard
