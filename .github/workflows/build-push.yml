name: Build & Push to GHCR

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # Push image to GHCR
      security-events: write   # Grype SARIF upload for built images
    strategy:
      fail-fast: false
      matrix:
        include:
          - app_dir: hle-family_manager
            image_name: hle-family-manager
            app_name: "HLE Family Manager"
            dockerfile: Containerfile.nextjs
          - app_dir: hle-familyhub
            image_name: hle-familyhub
            app_name: "HLE FamilyHub"
            dockerfile: Containerfile.nextjs
          - app_dir: hle-family_finance
            image_name: hle-family-finance
            app_name: "HLE Family Finance"
            dockerfile: Containerfile.nextjs
          - app_dir: hle-family_health
            image_name: hle-family-health
            app_name: "HLE Family Health"
            dockerfile: Containerfile.nextjs
          - app_dir: hle-family_home_care
            image_name: hle-family-home-care
            app_name: "HLE Family Home Care"
            dockerfile: Containerfile.nextjs
          - app_dir: hle-file_server
            image_name: hle-file-server
            app_name: "HLE File Server"
            dockerfile: Containerfile.nextjs
          - app_dir: hle-meal_prep
            image_name: hle-meal-prep
            app_name: "HLE Meal Prep"
            dockerfile: Containerfile.nextjs
          - app_dir: hle-family_wiki
            image_name: hle-family-wiki
            app_name: "HLE Family Wiki"
            dockerfile: Containerfile.nextjs
          - app_dir: hle-claude_api
            image_name: hle-claude-api
            app_name: "HLE Claude API"
            dockerfile: Containerfile.nextjs
          - app_dir: hle-family_travel
            image_name: hle-family-travel
            app_name: "HLE Family Travel"
            dockerfile: Containerfile.nextjs
          # Bun app — uses Containerfile.bun. NEXT_PUBLIC_APP_NAME is
          # passed as an unused build-arg for matrix uniformity; Bun's
          # Containerfile silently ignores it.
          - app_dir: hle-media
            image_name: hle-media
            app_name: "HLE Media"
            dockerfile: Containerfile.bun

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      # Build locally first so we can scan before push — prevents vulnerable
      # images from ever reaching GHCR.
      - name: Build (local, for scan)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.image_name }}:scan
          build-args: |
            APP_DIR=${{ matrix.app_dir }}
            NEXT_PUBLIC_APP_NAME=${{ matrix.app_name }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

      # Image scanning with Grype (Anchore) instead of Trivy.
      # Grype consumes the .grype.yaml config at the repo root, which
      # carries the VEX-style ignore list for upstream-gated CVEs. See
      # docs/THREAT_MODEL.md §6 G-9..G-11 for the accepted-risk rationale.
      # Each ignore entry has a review-by date; stale entries should be
      # removed the same PR that lands an upstream fix.
      #
      # Grype replaces Trivy for IMAGE scanning here. Trivy is still
      # used for filesystem and config scanning in security.yml where
      # its strengths (IaC, config, OS package coverage) are better.
      - name: Grype image scan (SARIF)
        id: grype-sarif
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: ${{ matrix.image_name }}:scan
          fail-build: false
          output-format: sarif
          severity-cutoff: medium

      - name: Upload image SARIF
        if: always() && steps.grype-sarif.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          sarif_file: ${{ steps.grype-sarif.outputs.sarif }}
          category: grype-image-${{ matrix.image_name }}

      - name: Grype image scan (fail on HIGH/CRITICAL)
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: ${{ matrix.image_name }}:scan
          fail-build: true
          severity-cutoff: high
          output-format: table

      - name: Push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_DIR=${{ matrix.app_dir }}
            NEXT_PUBLIC_APP_NAME=${{ matrix.app_name }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

      # CycloneDX SBOM of the built image — supply-chain provenance for
      # NIST SR-4 / SR-11 and FOSS-consumer transparency. Attached as a
      # workflow artifact; can later be attested via cosign.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ matrix.image_name }}:scan
          format: cyclonedx-json
          artifact-name: sbom-${{ matrix.image_name }}.cdx.json
          output-file: sbom-${{ matrix.image_name }}.cdx.json
