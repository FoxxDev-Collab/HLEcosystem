sonar.projectKey=foxx-dev_HLEcosystem
sonar.projectName=HLEcosystem
sonar.organization=foxx-dev

sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclude generated, vendored, and archived trees. SonarQube would otherwise
# spend most of its analysis time on Prisma-generated clients and Next.js
# build artifacts, neither of which we own or can fix.
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/generated/**,\
  **/prisma/generated/**,\
  **/*.min.js,\
  **/*.min.css,\
  HLEcosystem_Dotnet_Backup/**,\
  hle-*-backup/**,\
  hle-*-archive*/**,\
  bedrock-cmmc-monolith-archive-*/**

# Tests live next to source as *.test.ts / *.test.tsx (vitest convention).
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.config.ts,\
  **/*.config.js,\
  **/prisma/seed.ts,\
  **/next.config.ts,\
  **/tailwind.config.ts,\
  **/postcss.config.*

# If/when apps emit lcov, this pattern picks them up automatically.
sonar.javascript.lcov.reportPaths=\
  hle-family_manager/coverage/lcov.info,\
  hle-family_finance/coverage/lcov.info,\
  hle-familyhub/coverage/lcov.info,\
  hle-family_health/coverage/lcov.info,\
  hle-family_home_care/coverage/lcov.info,\
  hle-file_server/coverage/lcov.info,\
  hle-meal_prep/coverage/lcov.info,\
  hle-family_wiki/coverage/lcov.info,\
  hle-claude_api/coverage/lcov.info,\
  hle-family_travel/coverage/lcov.info,\
  hle-media/coverage/lcov.info
