# compose.yaml
# HLEcosystem — PostgreSQL + 7 Next.js apps

x-nextjs-app: &nextjs-app
  restart: unless-stopped
  networks:
    - hle-net
  depends_on:
    postgres:
      condition: service_healthy
  environment: &nextjs-env
    NODE_ENV: production
    NEXT_TELEMETRY_DISABLED: "1"
    HOSTNAME: "0.0.0.0"
    PORT: "3000"
    AUTH_URL: ${AUTH_URL:-http://localhost:8080}
    AUTH_DOMAIN: ${AUTH_DOMAIN:-}
    SECURE_COOKIES: ${SECURE_COOKIES:-}
    NEXT_PUBLIC_APP_URL_MANAGER: ${AUTH_URL:-http://localhost:8080}
    NEXT_PUBLIC_APP_URL_HUB: ${HUB_URL:-http://localhost:8081}
    NEXT_PUBLIC_APP_URL_FINANCE: ${FINANCE_URL:-http://localhost:8082}
    NEXT_PUBLIC_APP_URL_HEALTH: ${HEALTH_URL:-http://localhost:8083}
    NEXT_PUBLIC_APP_URL_HOME: ${HOMECARE_URL:-http://localhost:8084}
    NEXT_PUBLIC_APP_URL_FILES: ${FILES_URL:-http://localhost:8085}
    NEXT_PUBLIC_APP_URL_MEALS: ${MEALS_URL:-http://localhost:8086}
    NEXT_PUBLIC_APP_URL_WIKI: ${WIKI_URL:-http://localhost:8087}
  healthcheck:
    test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 20s
  logging:
    driver: "json-file"
    options:
      max-size: "100m"
      max-file: "10"
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 128M

services:

  # PostgreSQL 16
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: foxxlab-postgres
    restart: unless-stopped
    networks:
      - hle-net
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: foxxlab
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d foxxlab"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Family Manager — Central auth & user management
  hle-family-manager:
    <<: *nextjs-app
    container_name: foxxlab-family-manager
    build:
      context: .
      dockerfile: Containerfile.nextjs
      args:
        APP_DIR: hle-family_manager
        NEXT_PUBLIC_APP_NAME: "HLE Family Manager"
    ports:
      - "8080:3000"
    environment:
      <<: *nextjs-env
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/foxxlab?schema=family_manager"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      HOUSEHOLD_NAME: ${HOUSEHOLD_NAME:-My Household}
      HUB_URL: ${HUB_URL:-http://localhost:8081}
      FINANCE_URL: ${FINANCE_URL:-http://localhost:8082}
      HEALTH_URL: ${HEALTH_URL:-http://localhost:8083}
      HOMECARE_URL: ${HOMECARE_URL:-http://localhost:8084}
      FILES_URL: ${FILES_URL:-http://localhost:8085}
      MEALS_URL: ${MEALS_URL:-http://localhost:8086}
      WIKI_URL: ${WIKI_URL:-http://localhost:8087}

  # FamilyHub — Family relationships, dates, gifts
  hle-familyhub:
    <<: *nextjs-app
    container_name: foxxlab-familyhub
    build:
      context: .
      dockerfile: Containerfile.nextjs
      args:
        APP_DIR: hle-familyhub
        NEXT_PUBLIC_APP_NAME: "HLE FamilyHub"
    ports:
      - "8081:3000"
    environment:
      <<: *nextjs-env
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/foxxlab?schema=familyhub"
      APP_URL: ${HUB_URL:-http://localhost:8081}

  # Family Finance
  hle-family-finance:
    <<: *nextjs-app
    container_name: foxxlab-family-finance
    build:
      context: .
      dockerfile: Containerfile.nextjs
      args:
        APP_DIR: hle-family_finance
        NEXT_PUBLIC_APP_NAME: "HLE Family Finance"
    ports:
      - "8082:3000"
    volumes:
      - family-finance-uploads:/app/uploads
    environment:
      <<: *nextjs-env
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/foxxlab?schema=family_finance"
      APP_URL: ${FINANCE_URL:-http://localhost:8082}
      CLAUDE_API_URL: "http://hle-claude-api:3000"
      CLAUDE_API_SERVICE_SECRET: ${CLAUDE_API_SERVICE_SECRET}

  # Family Health
  hle-family-health:
    <<: *nextjs-app
    container_name: foxxlab-family-health
    build:
      context: .
      dockerfile: Containerfile.nextjs
      args:
        APP_DIR: hle-family_health
        NEXT_PUBLIC_APP_NAME: "HLE Family Health"
    ports:
      - "8083:3000"
    environment:
      <<: *nextjs-env
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/foxxlab?schema=family_health"
      APP_URL: ${HEALTH_URL:-http://localhost:8083}

  # Family Home Care
  hle-family-home-care:
    <<: *nextjs-app
    container_name: foxxlab-family-home-care
    build:
      context: .
      dockerfile: Containerfile.nextjs
      args:
        APP_DIR: hle-family_home_care
        NEXT_PUBLIC_APP_NAME: "HLE Family Home Care"
    ports:
      - "8084:3000"
    volumes:
      - home-care-uploads:/app/uploads
    environment:
      <<: *nextjs-env
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/foxxlab?schema=family_home_care"
      APP_URL: ${HOMECARE_URL:-http://localhost:8084}
      UPLOAD_DIR: "/app/uploads"
      MAX_FILE_SIZE_MB: "50"

  # File Server
  hle-file-server:
    <<: *nextjs-app
    container_name: foxxlab-file-server
    build:
      context: .
      dockerfile: Containerfile.nextjs
      args:
        APP_DIR: hle-file_server
        NEXT_PUBLIC_APP_NAME: "HLE File Server"
    ports:
      - "8085:3000"
    volumes:
      - file-server-uploads:/app/uploads
    environment:
      <<: *nextjs-env
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/foxxlab?schema=file_server"
      APP_URL: ${FILES_URL:-http://localhost:8085}
      UPLOAD_DIR: "/app/uploads"
      MAX_FILE_SIZE_MB: "500"
      CLAUDE_API_URL: "http://hle-claude-api:3000"
      CLAUDE_API_SERVICE_SECRET: ${CLAUDE_API_SERVICE_SECRET}

  # Meal Prep
  hle-meal-prep:
    <<: *nextjs-app
    container_name: foxxlab-meal-prep
    build:
      context: .
      dockerfile: Containerfile.nextjs
      args:
        APP_DIR: hle-meal_prep
        NEXT_PUBLIC_APP_NAME: "HLE Meal Prep"
    ports:
      - "8086:3000"
    environment:
      <<: *nextjs-env
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/foxxlab?schema=meal_prep"
      APP_URL: ${MEALS_URL:-http://localhost:8086}
      CLAUDE_API_URL: ${CLAUDE_API_URL:-http://hle-claude-api:3000}
      CLAUDE_API_SERVICE_SECRET: ${CLAUDE_API_SERVICE_SECRET:-}

  # Family Wiki
  hle-family-wiki:
    <<: *nextjs-app
    container_name: foxxlab-family-wiki
    build:
      context: .
      dockerfile: Containerfile.nextjs
      args:
        APP_DIR: hle-family_wiki
        NEXT_PUBLIC_APP_NAME: "HLE Family Wiki"
    ports:
      - "8087:3000"
    environment:
      <<: *nextjs-env
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/foxxlab?schema=family_wiki"
      APP_URL: ${WIKI_URL:-http://localhost:8087}

  # Claude API Gateway — Centralized AI service for ecosystem apps
  hle-claude-api:
    <<: *nextjs-app
    container_name: foxxlab-claude-api
    build:
      context: .
      dockerfile: Containerfile.nextjs
      args:
        APP_DIR: hle-claude_api
        NEXT_PUBLIC_APP_NAME: "HLE Claude API"
    ports:
      - "${CLAUDE_API_PORT:-8088}:3000"
    environment:
      <<: *nextjs-env
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/foxxlab?schema=claude_api"
      APP_URL: ${CLAUDE_API_URL:-http://localhost:8088}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_API_SERVICE_SECRET: ${CLAUDE_API_SERVICE_SECRET}

networks:
  hle-net:
    driver: bridge
    name: hle-net

volumes:
  postgres-data:
    name: hle-postgres-data
  family-finance-uploads:
    name: hle-family-finance-uploads
  home-care-uploads:
    name: hle-home-care-uploads
  file-server-uploads:
    name: hle-file-server-uploads
